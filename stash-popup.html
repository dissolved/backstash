<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Backstash</title>
    <link rel="stylesheet" href="stash-popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <p class="eyebrow">Backstash</p>
      <h1>Stash for later</h1>
      <form id="stash-form" class="stash-form">
        <label class="field-label" for="minutes-input">Duration</label>
        <div class="input-row">
          <input
            id="minutes-input"
            name="minutes"
            class="minutes-input"
            type="text"
            inputmode="numeric"
            autocomplete="off"
            placeholder="2h"
          />
          <button type="submit" class="submit-button">Stash</button>
        </div>
        <p class="helper-text">Enter <code>15</code>, <code>15m</code>, <code>2h</code>, or <code>3d</code>.</p>
        <p id="status-message" class="status-message" aria-live="polite"></p>
      </form>
      <section class="stashes-panel" aria-labelledby="stashes-heading">
        <div class="panel-header">
          <div>
            <p class="eyebrow panel-eyebrow">Scheduled</p>
            <h2 id="stashes-heading">Current stashes</h2>
          </div>
          <button id="restore-all-button" type="button" class="secondary-button">Restore all</button>
        </div>
        <p id="stashes-empty" class="helper-text">No tabs are currently stashed.</p>
        <ul id="stashes-list" class="stashes-list"></ul>
      </section>
    </main>
    <script src="constants.js"></script>
    <script src="stash-presets.js"></script>
    <script src="stash-popup.js"></script>
  </body>
</html>
